services:
  tg-uploader:
    image: yushum/tg-uploader:latest
    container_name: tg_uploader
    restart: always
    env_file: .env
    environment:
      - TZ=Asia/Shanghai
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - CHANNEL_ID=${CHANNEL_ID}
      - WATCH_DIR=/downloads
      - SESSION_NAME=/app/session/uploader
      - DB_PATH=/app/session/uploader.db
      
      # [Optional] Custom Device Name
      # - DEVICE_MODEL=TG-Uploader
      # - SYSTEM_VERSION=Linux
      # - APP_VERSION=1.0
      
      # [Optional] Proxy Configuration (e.g. socks5://127.0.0.1:1080)
      # - PROXY_TYPE=socks5
      # - PROXY_HOST=127.0.0.1
      # - PROXY_PORT=1080
      
      # [Optional] Performance Tuning
      # - MAX_CONCURRENT_UPLOADS=1    # Number of files uploading simultaneously (1-10)
      # - MAX_CONNECTIONS=20           # Number of parallel MTProto connections per file (1-32)
      # - MAX_SPLIT_SIZE_MB=2000       # Max file size before splitting, auto-detected by Premium status (50-4000)
      
    volumes:
      - ./downloads:/downloads
      - ./session:/app/session
    stop_grace_period: 2m

